clone_wiki() {
	if $use_git; then
		printf "Wget2 Wiki Cloning in progress...\n"
		git submodule update --init -- wiki
		wiki_status=$?
		if [ $wiki_status -eq 0 ]
		then
			printf "\033[1;32mWiki pages cloned\033[0m\n"
		else
			printf "\033[1;31mUnable to clone wiki but no issues you can continue\033[0m\n"
		fi
	fi
}

bootstrap_post_pull_hook() {
	clone_wiki
}

bootstrap_epilogue() {
	rm -f tests/.gitignore
	rm -f tests/_Noreturn.h \
		tests/arg-nonnull.h \
		tests/c++defs.h \
		tests/dummy.c \
		tests/unused-parameter.h \
		tests/warn-on-use.h
}

bootstrap_post_import_hook ()
{
  # ./bootstrap calls 'autopoint --force' which will overwrite
  #   po/Makevars.template. So here we add what we need for a VPATH
  #   build. ./bootstrap will create po/Makevars from po/Makevars.template
  #   after our change.
  sed -i 's/^PACKAGE_GNU =$/PACKAGE_GNU = yes/' po/Makevars.template
}
